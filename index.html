<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Activity — RDA</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0f1a">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app-nav"></div>

<main id="app-content" hidden>
<div class="page">

  <div class="page-header">
    <div class="page-title">Activity</div>
    <div class="page-desc">Log a run and keep track of everything you've done.</div>
  </div>

  <div class="card" id="entry-card">
    <form id="run-form">
      <div class="form-row-2">
        <div class="form-field">
          <label for="f-date">Date</label>
          <input type="date" id="f-date" required>
        </div>
        <div class="form-field">
          <label for="f-time">Time of day</label>
          <input type="time" id="f-time">
        </div>
      </div>

      <div class="form-field">
        <label for="f-distance">Distance (km)</label>
        <input type="number" id="f-distance" inputmode="decimal" step="0.01" min="0" placeholder="e.g. 10.00" required>
      </div>

      <div class="form-field">
        <label>Duration</label>
        <div class="duration-inputs">
          <input type="number" id="f-dur-h" inputmode="numeric" min="0" max="23" placeholder="0">
          <input type="number" id="f-dur-m" inputmode="numeric" min="0" max="59" placeholder="00">
          <input type="number" id="f-dur-s" inputmode="numeric" min="0" max="59" placeholder="00">
        </div>
        <div class="duration-labels"><span>Hours</span><span>Mins</span><span>Secs</span></div>
      </div>

      <div class="pace-display">
        <span class="pace-display-label">Pace</span>
        <span class="pace-display-val" id="f-pace-out">—:— /km</span>
      </div>

      <div class="form-field">
        <label>Run type</label>
        <div class="type-chip-row" id="f-type-row">
          <button type="button" class="type-chip active" data-type="easy">Easy</button>
          <button type="button" class="type-chip" data-type="long">Long</button>
          <button type="button" class="type-chip" data-type="tempo">Tempo</button>
          <button type="button" class="type-chip" data-type="interval">Interval</button>
          <button type="button" class="type-chip" data-type="race">Race</button>
          <button type="button" class="type-chip" data-type="recovery">Recovery</button>
          <button type="button" class="type-chip" data-type="other">Other</button>
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label for="f-hr-max">Max HR</label>
          <input type="number" id="f-hr-max" inputmode="numeric" min="0" max="250" placeholder="bpm">
        </div>
        <div class="form-field">
          <label for="f-hr-min">Min HR</label>
          <input type="number" id="f-hr-min" inputmode="numeric" min="0" max="250" placeholder="bpm">
        </div>
        <div class="form-field">
          <label for="f-hr-avg">Avg HR</label>
          <input type="number" id="f-hr-avg" inputmode="numeric" min="0" max="250" placeholder="bpm">
        </div>
      </div>

      <div class="form-field">
        <label for="f-notes">Notes</label>
        <textarea id="f-notes" placeholder="How did it feel?"></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="f-submit">Save run</button>
    </form>
  </div>

  <div class="page-header" style="margin-top:32px">
    <div class="section-title">Your runs</div>
  </div>
  <div class="run-list" id="run-list"></div>

</div>
</main>

<!-- EDIT MODAL -->
<div class="modal-backdrop" id="edit-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Edit run</div>
      <button class="modal-close" id="edit-close" aria-label="Close">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <form id="edit-form">
      <div class="form-row-2">
        <div class="form-field">
          <label for="e-date">Date</label>
          <input type="date" id="e-date" required>
        </div>
        <div class="form-field">
          <label for="e-time">Time of day</label>
          <input type="time" id="e-time">
        </div>
      </div>
      <div class="form-field">
        <label for="e-distance">Distance (km)</label>
        <input type="number" id="e-distance" inputmode="decimal" step="0.01" min="0" required>
      </div>
      <div class="form-field">
        <label>Duration</label>
        <div class="duration-inputs">
          <input type="number" id="e-dur-h" inputmode="numeric" min="0" max="23">
          <input type="number" id="e-dur-m" inputmode="numeric" min="0" max="59">
          <input type="number" id="e-dur-s" inputmode="numeric" min="0" max="59">
        </div>
        <div class="duration-labels"><span>Hours</span><span>Mins</span><span>Secs</span></div>
      </div>
      <div class="pace-display">
        <span class="pace-display-label">Pace</span>
        <span class="pace-display-val" id="e-pace-out">—:— /km</span>
      </div>
      <div class="form-field">
        <label>Run type</label>
        <div class="type-chip-row" id="e-type-row">
          <button type="button" class="type-chip" data-type="easy">Easy</button>
          <button type="button" class="type-chip" data-type="long">Long</button>
          <button type="button" class="type-chip" data-type="tempo">Tempo</button>
          <button type="button" class="type-chip" data-type="interval">Interval</button>
          <button type="button" class="type-chip" data-type="race">Race</button>
          <button type="button" class="type-chip" data-type="recovery">Recovery</button>
          <button type="button" class="type-chip" data-type="other">Other</button>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label for="e-hr-max">Max HR</label>
          <input type="number" id="e-hr-max" inputmode="numeric" min="0" max="250">
        </div>
        <div class="form-field">
          <label for="e-hr-min">Min HR</label>
          <input type="number" id="e-hr-min" inputmode="numeric" min="0" max="250">
        </div>
        <div class="form-field">
          <label for="e-hr-avg">Avg HR</label>
          <input type="number" id="e-hr-avg" inputmode="numeric" min="0" max="250">
        </div>
      </div>
      <div class="form-field">
        <label for="e-notes">Notes</label>
        <textarea id="e-notes"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-danger" id="edit-delete">Delete</button>
        <button type="submit" class="btn btn-primary">Save changes</button>
      </div>
    </form>
  </div>
</div>

<script type="module" src="js/activity.js"></script>
</body>
</html>
